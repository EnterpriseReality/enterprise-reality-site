name: quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Astro and TypeScript check
        run: npm run check

      - name: Unit tests
        run: npm run test

      - name: Browser and accessibility smoke tests
        run: npm run test:e2e

      - name: Production build
        run: npm run build

      - name: Public boundary check
        run: npm run public-boundary:check
